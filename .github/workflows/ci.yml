name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend and product integrity
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit generated lockfile
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          Copy-Item src-tauri/Cargo.lock "$env:RUNNER_TEMP\Cargo.lock" -Force
          git fetch origin $env:HEAD_REF
          git checkout $env:HEAD_REF
          Copy-Item "$env:RUNNER_TEMP\Cargo.lock" src-tauri/Cargo.lock -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.lock
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Cargo lockfile for optional sidecar"
            git push origin "HEAD:$env:HEAD_REF"
          }

      - name: Test Rust
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Clippy
        shell: pwsh
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath cargo-clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            cargo-check.log
            cargo-test.log
            cargo-clippy.log
          if-no-files-found: ignore
          retention-days: 7

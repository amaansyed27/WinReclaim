name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend and product integrity
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check 2>&1 | Tee-Object -FilePath cargo-fmt.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Check Rust
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test Rust
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Clippy
        shell: pwsh
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath cargo-clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            cargo-fmt.log
            cargo-check.log
            cargo-test.log
            cargo-clippy.log
          if-no-files-found: ignore
          retention-days: 7

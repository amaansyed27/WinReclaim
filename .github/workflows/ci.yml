name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  cleanup-obsolete-actions:
    name: Remove obsolete workflow history
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[cleanup-actions]')
    runs-on: ubuntu-latest
    steps:
      - name: Delete runs for removed workflow files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.getContent({
              owner,
              repo,
              path: '.github/workflows',
              ref: 'main'
            });

            if (!Array.isArray(response.data)) {
              core.setFailed('Unable to enumerate .github/workflows');
              return;
            }

            const activePaths = new Set(
              response.data
                .filter((item) => item.type === 'file' && /\.ya?ml$/i.test(item.name))
                .map((item) => item.path)
            );

            core.info(`Keeping workflow history for: ${[...activePaths].sort().join(', ')}`);

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            const obsoleteRuns = runs.filter(
              (run) => run.status === 'completed' && run.path && !activePaths.has(run.path)
            );

            core.info(`Deleting ${obsoleteRuns.length} obsolete workflow runs.`);

            for (const run of obsoleteRuns) {
              core.info(`Deleting run ${run.id}: ${run.name} (${run.path})`);
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
            }

  validate:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend and product integrity
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test Rust
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --all-targets 2>&1 | Tee-Object -FilePath cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Clippy
        shell: pwsh
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath cargo-clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            cargo-check.log
            cargo-test.log
            cargo-clippy.log
          if-no-files-found: ignore
          retention-days: 7

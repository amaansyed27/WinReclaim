name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release"
        required: true
        default: "1.0.0"
        type: string
      release_notes:
        description: "Release notes"
        required: false
        default: "Windows 11 x64 release with local-first scanning, safe cleanup plans, receipts, and signed in-app updates."
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/release-trigger.json"

permissions:
  contents: write
  issues: write

concurrency:
  group: winreclaim-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || '1.0.0' }}
      RELEASE_NOTES: ${{ inputs.release_notes || 'Windows 11 x64 release with local-first scanning, safe cleanup plans, receipts, and signed in-app updates.' }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease || false }}
      CARGO_TERM_COLOR: never

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Verify updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret."
          }

      - name: Set release version
        shell: pwsh
        run: npm run version:set -- "$env:RELEASE_VERSION"

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        run: |
          npm run check
          npm run build

      - name: Validate Rust
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo fmt --check
          cargo test --quiet
          cargo clippy --all-targets --quiet -- -D warnings

      - name: Commit release version
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Release v$env:RELEASE_VERSION"
            git push origin HEAD:main
          }
          "RELEASE_COMMIT=$(git rev-parse HEAD)" >> $env:GITHUB_ENV

      - name: Build signed Windows bundles
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Publish GitHub release and updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          try {
            $tag = "v$env:RELEASE_VERSION"
            $bundleRoot = Join-Path $env:GITHUB_WORKSPACE "src-tauri\target\x86_64-pc-windows-msvc\release\bundle"
            if (-not (Test-Path $bundleRoot)) {
              throw "Tauri bundle directory was not created: $bundleRoot"
            }

            $allFiles = @(Get-ChildItem $bundleRoot -Recurse -File)
            $nsisInstaller = $allFiles | Where-Object { $_.Name -like "*.exe" } | Select-Object -First 1
            $msiInstaller = $allFiles | Where-Object { $_.Name -like "*.msi" } | Select-Object -First 1
            $updaterArchive = $allFiles | Where-Object { $_.Name -like "*.nsis.zip" } | Select-Object -First 1
            $signatureFile = $allFiles | Where-Object { $_.Name -like "*.nsis.zip.sig" } | Select-Object -First 1

            if ($null -eq $nsisInstaller) { throw "NSIS installer was not produced." }
            if ($null -eq $msiInstaller) { throw "MSI installer was not produced." }
            if ($null -eq $updaterArchive) { throw "NSIS updater archive was not produced." }
            if ($null -eq $signatureFile) { throw "NSIS updater signature was not produced." }

            $signature = (Get-Content $signatureFile.FullName -Raw).Trim()
            $encodedName = [uri]::EscapeDataString($updaterArchive.Name)
            $downloadUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/releases/download/$tag/$encodedName"

            $manifest = [ordered]@{
              version = $env:RELEASE_VERSION
              notes = $env:RELEASE_NOTES
              pub_date = (Get-Date).ToUniversalTime().ToString("o")
              platforms = [ordered]@{
                "windows-x86_64" = [ordered]@{
                  signature = $signature
                  url = $downloadUrl
                }
              }
            }

            $manifestPath = Join-Path $env:GITHUB_WORKSPACE "latest.json"
            $manifest | ConvertTo-Json -Depth 8 | Set-Content $manifestPath -Encoding utf8

            $assets = @(
              $nsisInstaller.FullName,
              $msiInstaller.FullName,
              $updaterArchive.FullName,
              $signatureFile.FullName,
              $manifestPath
            )

            Write-Host "Release assets:"
            $assets | ForEach-Object { Write-Host " - $_" }

            $previousErrorAction = $ErrorActionPreference
            $ErrorActionPreference = "SilentlyContinue"
            & gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
            $releaseExists = $LASTEXITCODE -eq 0
            $ErrorActionPreference = $previousErrorAction
            $global:LASTEXITCODE = 0

            if ($releaseExists) {
              $uploadArguments = @("release", "upload", $tag) + $assets + @(
                "--repo", $env:GITHUB_REPOSITORY,
                "--clobber"
              )
              & gh @uploadArguments
              if ($LASTEXITCODE -ne 0) { throw "GitHub release asset upload failed." }

              & gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "WinReclaim $tag" --notes $env:RELEASE_NOTES
              if ($LASTEXITCODE -ne 0) { throw "GitHub release metadata update failed." }
            } else {
              $createArguments = @("release", "create", $tag) + $assets + @(
                "--repo", $env:GITHUB_REPOSITORY,
                "--title", "WinReclaim $tag",
                "--notes", $env:RELEASE_NOTES,
                "--target", $env:RELEASE_COMMIT
              )
              if ($env:RELEASE_PRERELEASE -eq "true") {
                $createArguments += "--prerelease"
              }

              & gh @createArguments
              if ($LASTEXITCODE -ne 0) { throw "GitHub release publication failed." }
            }

            & gh release view $tag --repo $env:GITHUB_REPOSITORY --json url,assets
            if ($LASTEXITCODE -ne 0) { throw "Published release verification failed." }
          } catch {
            $bodyPath = Join-Path $env:RUNNER_TEMP "release-publication-diagnostics.md"
            @(
              "# Automated release diagnostics"
              ""
              "Commit: $env:GITHUB_SHA"
              "Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
              "Stage: GitHub Release publication"
              ""
              "Error: $($_.Exception.Message)"
              ""
              "Bundle files:"
              $(if (Test-Path $bundleRoot) { (Get-ChildItem $bundleRoot -Recurse -File | ForEach-Object { "- $($_.FullName)" }) } else { "- Bundle directory missing" })
            ) | Set-Content $bodyPath -Encoding utf8
            & gh issue edit 1 --repo $env:GITHUB_REPOSITORY --body-file $bodyPath
            throw
          }

      - name: Close resolved diagnostic issue
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close 1 --repo $env:GITHUB_REPOSITORY --comment "Resolved by the successful v$env:RELEASE_VERSION release pipeline."

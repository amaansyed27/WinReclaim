name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release"
        required: true
        default: "1.0.0"
        type: string
      release_notes:
        description: "Optional release notes placed above generated notes"
        required: false
        default: "Windows 11 x64 release with local-first scanning, safe cleanup plans, receipts, and signed in-app updates."
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/release-trigger.json"

permissions:
  contents: write
  issues: write

concurrency:
  group: winreclaim-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || '1.0.0' }}
      RELEASE_NOTES: ${{ inputs.release_notes || 'Windows 11 x64 release with local-first scanning, safe cleanup plans, receipts, and signed in-app updates.' }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease || false }}

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Verify updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Signed updater releases are mandatory."
          }

      - name: Set release version
        shell: pwsh
        run: npm run version:set -- "$env:RELEASE_VERSION"

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        run: |
          npm run check
          npm run build

      - name: Normalize Rust formatting and machine-applicable lints
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        env:
          CARGO_TERM_COLOR: never
        run: |
          cargo fmt
          cargo clippy --fix --all-targets --allow-dirty --allow-staged -- -D warnings

      - name: Validate Rust formatting, tests and lint
        id: rust_validation
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        env:
          CARGO_TERM_COLOR: never
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "rust-validation.log"
          Remove-Item $logPath -Force -ErrorAction SilentlyContinue
          $script:failed = $false

          function Invoke-CargoCheck {
            param(
              [string]$Label,
              [string[]]$Arguments
            )

            "### $Label" | Tee-Object -FilePath $logPath -Append
            & cargo @Arguments 2>&1 | Tee-Object -FilePath $logPath -Append
            $code = $LASTEXITCODE
            "exit_code=$code" | Tee-Object -FilePath $logPath -Append
            "" | Tee-Object -FilePath $logPath -Append

            if ($code -ne 0) {
              $script:failed = $true
            }
          }

          Invoke-CargoCheck "cargo fmt --check" @("fmt", "--check")
          Invoke-CargoCheck "cargo test" @("test")
          Invoke-CargoCheck "cargo clippy --all-targets -- -D warnings" @("clippy", "--all-targets", "--", "-D", "warnings")

          if ($script:failed) {
            exit 1
          }

      - name: Publish Rust failure diagnostics
        if: steps.rust_validation.outcome == 'failure'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "rust-validation.log"
          $logText = (Get-Content $logPath -Tail 250) -join "`n"
          if ($logText.Length -gt 30000) {
            $logText = $logText.Substring($logText.Length - 30000)
          }

          $bodyPath = Join-Path $env:RUNNER_TEMP "rust-validation-issue.md"
          @(
            "# Automated release diagnostics"
            ""
            "- Commit: $env:GITHUB_SHA"
            "- Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "- Workflow: $env:GITHUB_WORKFLOW"
            ""
            "## Rust validation output"
            ""
            '```text'
            $logText
            '```'
          ) | Set-Content -Path $bodyPath -Encoding utf8

          $existing = gh issue list --repo $env:GITHUB_REPOSITORY --state open --search '"Automated release diagnostics" in:title' --json number --jq '.[0].number'
          if ([string]::IsNullOrWhiteSpace($existing)) {
            gh issue create --repo $env:GITHUB_REPOSITORY --title "Automated release diagnostics" --body-file $bodyPath
          } else {
            gh issue edit $existing --repo $env:GITHUB_REPOSITORY --body-file $bodyPath
          }

          throw "Rust validation failed. The compiler output was published to the Automated release diagnostics issue."

      - name: Commit normalized release source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Prepare release v$env:RELEASE_VERSION"
            git push origin HEAD:main
          }
          "RELEASE_COMMIT=$(git rev-parse HEAD)" >> $env:GITHUB_ENV

      - name: Build, sign and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: "v__VERSION__"
          releaseName: "WinReclaim v__VERSION__"
          releaseBody: "${{ env.RELEASE_NOTES }}"
          releaseCommitish: "${{ env.RELEASE_COMMIT }}"
          releaseDraft: false
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "winreclaim-[platform]-[arch]-[bundle]"
          retryAttempts: 1
          args: "--target x86_64-pc-windows-msvc"

name: Apply storage assistant integration

on:
  push:
    branches:
      - local-storage-assistant

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: local-storage-assistant
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Integrate assistant UI and safeguards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              source = file.read_text()
              if old not in source:
                  raise SystemExit(f'{path}: expected block not found')
              file.write_text(source.replace(old, new, 1))

          settings = 'src/features/settings/SettingsView.tsx'
          replace_once(
              settings,
              'import { formatBytes } from "../../lib/format";\n',
              'import { formatBytes } from "../../lib/format";\nimport { StorageAssistantSettings } from "../assistant/StorageAssistantSettings";\n'
          )
          replace_once(
              settings,
              '      <section className="surface settings-section">\n        <div className="settings-section-head">\n          <div>\n            <span className="surface-label">Updates</span>',
              '      <StorageAssistantSettings disabled={scanning || busyAction !== null} />\n\n      <section className="surface settings-section">\n        <div className="settings-section-head">\n          <div>\n            <span className="surface-label">Updates</span>'
          )
          replace_once(
              settings,
              '<p>Clears scans, history, plans, receipts and saved preferences. Restore files are preserved unless explicitly included.</p>',
              '<p>Clears scans, history, plans, receipts and saved preferences. Restore files and the separately managed Storage Assistant model are preserved.</p>'
          )

          findings = 'src/features/findings/FindingsView.tsx'
          replace_once(
              findings,
              'import { ArrowIcon, ShieldIcon } from "../../components/Icons";\n',
              'import { ArrowIcon, ShieldIcon } from "../../components/Icons";\nimport { StorageAssistantPanel } from "../assistant/StorageAssistantPanel";\n'
          )
          replace_once(
              findings,
              '      </section>\n\n      {aiStatus?.configured && (\n',
              '      </section>\n\n      <StorageAssistantPanel report={report} />\n\n      {aiStatus?.configured && (\n'
          )

          app_data = 'src-tauri/src/app_data.rs'
          replace_once(
              app_data,
              '        if name == DATA_GENERATION_FILE {\n            continue;\n        }\n        if !request.include_restore_files && name == "vault" {',
              '        if name == DATA_GENERATION_FILE {\n            continue;\n        }\n        if name == "models" {\n            continue;\n        }\n        if !request.include_restore_files && name == "vault" {'
          )

          integrity = Path('scripts/check-product-integrity.mjs')
          source = integrity.read_text()
          source = source.replace(
              '  "src/features/findings/FindingsView.tsx",\n',
              '  "src/features/findings/FindingsView.tsx",\n  "src/features/assistant/StorageAssistantPanel.tsx",\n  "src/features/assistant/StorageAssistantSettings.tsx",\n',
              1
          )
          marker = '\nif (violations.length) {\n'
          checks = r'''
const assistantBackend = readFileSync("src-tauri/src/assistant/mod.rs", "utf8");
for (const required of ["Qwen3.5-2B", "Q4_K_M", "MODEL_SHA256", "assistant::analyze"]) {
  if (!assistantBackend.includes(required)) {
    violations.push(`src-tauri/src/assistant/mod.rs: missing local assistant contract "${required}"`);
  }
}

const assistantInference = readFileSync("src-tauri/src/assistant/inference.rs", "utf8");
for (const required of ["advisory_only: true", "contains_cleanup_claim", "finding_ids.contains", "MAX_ANNOTATIONS"]) {
  if (!assistantInference.includes(required)) {
    violations.push(`src-tauri/src/assistant/inference.rs: missing output safeguard "${required}"`);
  }
}

const assistantPrompt = readFileSync("src-tauri/src/assistant/prompt.rs", "utf8");
for (const required of ["untrusted data", "Never say a folder is safe to delete", "Never change or reinterpret risk_class"]) {
  if (!assistantPrompt.includes(required)) {
    violations.push(`src-tauri/src/assistant/prompt.rs: missing authority boundary "${required}"`);
  }
}

const appLib = readFileSync("src-tauri/src/lib.rs", "utf8");
for (const command of ["get_storage_assistant_status", "install_storage_assistant", "uninstall_storage_assistant", "analyze_storage_report"]) {
  if (!appLib.includes(command)) {
    violations.push(`src-tauri/src/lib.rs: missing assistant command "${command}"`);
  }
}

if (!appDataBackend.includes('name == "models"')) {
  violations.push("src-tauri/src/app_data.rs: application reset no longer preserves the optional model");
}
'''
          if marker not in source:
              raise SystemExit('integrity insertion marker not found')
          integrity.write_text(source.replace(marker, f'\n{checks}{marker}', 1))
          PY

          cargo fmt --manifest-path src-tauri/Cargo.toml
          cargo generate-lockfile --manifest-path src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src src-tauri scripts docs Cargo.lock src-tauri/Cargo.lock 2>/dev/null || true
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Integrate optional local storage assistant"
          git push

name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish, without the v prefix
        required: true
        default: "1.1.0"
        type: string
      release_notes:
        description: Optional release notes shown on GitHub
        required: false
        default: ""
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        default: false
        type: boolean

  # BEGIN ONE-TIME ACTIONS CLEANUP TRIGGER
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-windows.yml"
      - ".github/workflows/validate.yml"
  # END ONE-TIME ACTIONS CLEANUP TRIGGER

permissions:
  contents: write
  # BEGIN ONE-TIME ACTIONS CLEANUP PERMISSION
  actions: write
  # END ONE-TIME ACTIONS CLEANUP PERMISSION

concurrency:
  group: winreclaim-windows-release
  cancel-in-progress: false

jobs:
  # BEGIN ONE-TIME ACTIONS CLEANUP JOB
  cleanup-actions-history:
    if: github.event_name == 'push'
    name: Remove obsolete workflow history
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Delete completed runs from obsolete workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            "/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" \
            --jq '.[] | .workflow_runs[] |
              select(.id != (env.GITHUB_RUN_ID | tonumber)) |
              select(.status == "completed") |
              select(.path != ".github/workflows/release-windows.yml") |
              .id' |
          while read -r run_id; do
            if [ -n "$run_id" ]; then
              echo "Deleting obsolete workflow run $run_id"
              gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
            fi
          done

      - name: Remove one-time cleanup hook
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/release-windows.yml")
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          output = []
          skipping = False

          for line in lines:
              if "BEGIN ONE-TIME ACTIONS CLEANUP" in line:
                  skipping = True
                  continue
              if "END ONE-TIME ACTIONS CLEANUP" in line:
                  skipping = False
                  continue
              if not skipping:
                  output.append(line)

          path.write_text("".join(output), encoding="utf-8", newline="\n")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/release-windows.yml
          git commit -m "chore: remove one-time Actions cleanup hook"
          git push origin HEAD:main
  # END ONE-TIME ACTIONS CLEANUP JOB

  release:
    if: github.event_name == 'workflow_dispatch'
    name: Build and publish Windows x64
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Validate requested version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim().TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Version must be valid semantic version text, for example 1.2.3 or 1.2.3-beta.1"
          }

          $tag = "v$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($existingTag) {
            throw "Tag $tag already exists. Choose a new version."
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify updater signing secret
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is missing. Add it under repository Actions secrets before publishing."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Synchronize release version
        shell: pwsh
        run: |
          npm version $env:VERSION --no-git-tag-version --allow-same-version
          npm run version:set -- $env:VERSION
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Validate frontend
        shell: pwsh
        run: |
          npm run check
          npm run build

      - name: Validate Rust
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Commit synchronized version
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json

          if (-not (git diff --cached --quiet)) {
            git commit -m "chore: release $env:TAG"
            git push origin HEAD:main
          }

      - name: Build installers and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "WinReclaim v__VERSION__"
          releaseBody: |
            ${{ inputs.release_notes }}

            ## Downloads
            - **NSIS setup (.exe):** recommended for most Windows users
            - **MSI installer:** suitable for managed or administrative deployment

            WinReclaim is local-first. Scans, snapshots, cleanup plans, vault data and receipts remain on the device.
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          updaterJsonPreferNsis: true
          retryAttempts: 3

name: Release Windows

on:
  push:
    branches:
      - "release/*"
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to publish, without the v prefix
        required: true
        default: "1.2.5"
        type: string
      release_notes:
        description: Optional release notes shown on GitHub
        required: false
        default: ""
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: winreclaim-windows-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows x64
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Resolve and validate release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".Trim().TrimStart("v")
          } else {
            $releaseRef = "${{ github.ref_name }}"
            if (-not $releaseRef.StartsWith("release/")) {
              throw "Automated releases must be triggered from a release/<version> branch."
            }
            $version = $releaseRef.Substring("release/".Length).Trim().TrimStart("v")
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Version must be valid semantic version text, for example 1.2.3 or 1.2.3-beta.1"
          }

          $tag = "v$version"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($existingTag) {
            throw "Tag $tag already exists. Choose a new version."
          }

          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify updater signing configuration
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is missing. Add it under repository Actions secrets before publishing."
          }

          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is missing for the password-protected WinReclaim updater key."
          }

          $expectedPublicKey = "dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IDFFRjY1QTI5OEZDNTNFRkQKUldUOVBzV1BLVnIySG12VDJwb1RDMXBJZk8weVcrN3l6UFJ1a0NNMWZ2ZXY0WjFqZEJFRnRoL3IK"
          $config = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json

          if ($config.plugins.updater.pubkey -ne $expectedPublicKey) {
            throw "The updater public key in tauri.conf.json is not the approved v1.2.5 signing key."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Synchronize release version
        shell: pwsh
        run: |
          npm version $env:VERSION --no-git-tag-version --allow-same-version
          npm run version:set -- $env:VERSION
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Validate frontend
        shell: pwsh
        run: |
          npm run check
          npm run build

      - name: Validate Rust
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Commit synchronized version
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json

          if (-not (git diff --cached --quiet)) {
            git commit -m "chore: release $env:TAG"
            git push origin HEAD:main
          }

      - name: Build installers and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "WinReclaim v__VERSION__"
          releaseBody: |
            ${{ inputs.release_notes }}

            ## Downloads
            - **NSIS setup (.exe):** recommended for most Windows users
            - **MSI installer:** suitable for managed or administrative deployment

            This release includes the tabbed storage Review redesign and establishes the replacement updater signing key. Install v1.2.5 manually once if an older build reports a signature mismatch.

            WinReclaim remains local-first for scanning, planning, cleanup, history, receipts and restore. Cloud assistance is optional and advisory.
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          updaterJsonPreferNsis: true
          retryAttempts: 3

name: Format cloud pivot

on:
  push:
    branches:
      - fix/assistant-ui-and-structured-output
    paths:
      - .github/workflows/format-cloud-pivot.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/assistant-ui-and-structured-output
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Format and refresh lockfile
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all
          cargo check --manifest-path src-tauri/Cargo.toml --all-targets
      - name: Commit generated changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          if (-not (git diff --cached --quiet)) {
            git commit -m "chore: format OpenRouter cloud pivot"
            git push origin HEAD:fix/assistant-ui-and-structured-output
          }

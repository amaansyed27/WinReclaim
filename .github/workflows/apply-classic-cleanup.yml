name: Apply Classic Cleanup

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-classic-cleanup.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: winreclaim-classic-cleanup-migration
  cancel-in-progress: false

jobs:
  migrate-and-validate:
    runs-on: windows-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Apply migration
        id: migration
        continue-on-error: true
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "classic-migration.log"
          python scripts/apply_classic_cleanup.py 2>&1 | Tee-Object -FilePath $log
          exit $LASTEXITCODE

      - name: Complete enum integration
        if: steps.migration.outcome == 'success'
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          replace_once(
              "src/features/plan/PlanView.tsx",
              '''const recoveryLabels: Record<ActionKind, string> = {
            user_temp: "Undo Vault",
            crash_dumps: "Undo Vault",
            huggingface_prune: "Redownloadable",
            npm_cache: "Redownloadable",
            docker_prune: "Irreversible"
          };''',
              '''const recoveryLabels: Record<ActionKind, string> = {
            user_temp: "Undo Vault",
            system_temp: "Irreversible",
            prefetch: "Rebuildable",
            recycle_bin: "Irreversible",
            crash_dumps: "Undo Vault",
            huggingface_prune: "Redownloadable",
            npm_cache: "Redownloadable",
            docker_prune: "Irreversible"
          };''',
          )

          replace_once(
              "src-tauri/src/planner/mod.rs",
              '''            ActionKind::HuggingfacePrune | ActionKind::NpmCache => {
                          simulation.redownloadable_bytes = simulation
                              .redownloadable_bytes
                              .saturating_add(item.estimated_bytes);
                          simulation.estimated_recovery_minutes =
                              simulation.estimated_recovery_minutes.saturating_add(8);
                      }
                      ActionKind::DockerPrune => {''',
              '''            ActionKind::Prefetch => {
                          simulation.rebuildable_bytes = simulation
                              .rebuildable_bytes
                              .saturating_add(item.estimated_bytes);
                          simulation.estimated_recovery_minutes =
                              simulation.estimated_recovery_minutes.saturating_add(2);
                      }
                      ActionKind::HuggingfacePrune | ActionKind::NpmCache => {
                          simulation.redownloadable_bytes = simulation
                              .redownloadable_bytes
                              .saturating_add(item.estimated_bytes);
                          simulation.estimated_recovery_minutes =
                              simulation.estimated_recovery_minutes.saturating_add(8);
                      }
                      ActionKind::SystemTemp | ActionKind::RecycleBin | ActionKind::DockerPrune => {''',
          )

          replace_once(
              "src-tauri/src/scanner/profile.rs",
              '''        findings.extend(system_caches.findings);
                  completed_targets += 1;
              }
          ''',
              '''        findings.extend(system_caches.findings);
              }
          ''',
          )
          '@ | python -

      - name: Install dependencies
        if: steps.migration.outcome == 'success'
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        id: frontend
        if: steps.migration.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "classic-frontend.log"
          npm run check 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Validate Rust
        id: rust
        if: steps.migration.outcome == 'success'
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "classic-rust.log"
          cargo fmt 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --quiet 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --all-targets --quiet -- -D warnings 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Commit validated implementation
        id: commit
        if: steps.migration.outcome == 'success' && steps.frontend.outcome == 'success' && steps.rust.outcome == 'success'
        shell: pwsh
        run: |
          Remove-Item scripts/apply_classic_cleanup.py -Force
          Remove-Item .github/workflows/apply-classic-cleanup.yml -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add classic Windows cleanup and system-drive cache discovery"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish validation result
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $migrationPath = Join-Path $env:RUNNER_TEMP "classic-migration.log"
          $frontendPath = Join-Path $env:RUNNER_TEMP "classic-frontend.log"
          $rustPath = Join-Path $env:RUNNER_TEMP "classic-rust.log"
          $migrationLog = if (Test-Path $migrationPath) { (Get-Content $migrationPath -Tail 180) -join "`n" } else { "not run" }
          $frontendLog = if (Test-Path $frontendPath) { (Get-Content $frontendPath -Tail 180) -join "`n" } else { "not run" }
          $rustLog = if (Test-Path $rustPath) { (Get-Content $rustPath -Tail 260) -join "`n" } else { "not run" }
          $success = "${{ steps.migration.outcome }}" -eq "success" -and "${{ steps.frontend.outcome }}" -eq "success" -and "${{ steps.rust.outcome }}" -eq "success" -and "${{ steps.commit.outcome }}" -eq "success"
          $body = Join-Path $env:RUNNER_TEMP "classic-cleanup-validation.md"
          @(
            "# Classic cleanup and system-drive cache validation"
            ""
            "Source commit: $env:GITHUB_SHA"
            "Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "Migration: ${{ steps.migration.outcome }}"
            "Frontend: ${{ steps.frontend.outcome }}"
            "Rust: ${{ steps.rust.outcome }}"
            "Commit: ${{ steps.commit.outcome }}"
            "Ready: $success"
            ""
            "## Migration"
            '```text'
            $migrationLog
            '```'
            ""
            "## Frontend"
            '```text'
            $frontendLog
            '```'
            ""
            "## Rust"
            '```text'
            $rustLog
            '```'
          ) | Set-Content $body -Encoding utf8
          gh issue edit 5 --repo $env:GITHUB_REPOSITORY --body-file $body
          if ($success) {
            gh issue close 5 --repo $env:GITHUB_REPOSITORY --reason completed 2>$null
          } else {
            gh issue reopen 5 --repo $env:GITHUB_REPOSITORY 2>$null
            throw "Classic cleanup migration failed; issue #5 contains diagnostics"
          }

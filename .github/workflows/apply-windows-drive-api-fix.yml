name: Apply Windows drive API fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Remove unused scan counter and format
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          profile = Path('src-tauri/src/scanner/profile.rs')
          source = profile.read_text()
          line = '        discovered_bytes = discovered_bytes.saturating_add(system_caches.discovered_bytes);\n'
          if line not in source:
              raise SystemExit('unused system cache counter not found')
          profile.write_text(source.replace(line, '', 1))
          PY
          cargo fmt --manifest-path src-tauri/Cargo.toml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git commit -m "Remove unused multi-drive scan counter"
          git push

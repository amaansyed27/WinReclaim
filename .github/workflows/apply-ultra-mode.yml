name: Apply Ultra Mode

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/apply-ultra-mode.mjs"
      - ".github/workflows/apply-ultra-mode.yml"

permissions:
  contents: write
  issues: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Apply Ultra mode changes
        id: migrate
        continue-on-error: true
        shell: pwsh
        run: |
          node scripts/apply-ultra-mode.mjs 2>&1 | Tee-Object ultra-migration.log
          exit $LASTEXITCODE

      - name: Install frontend dependencies
        if: steps.migrate.outcome == 'success'
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        id: frontend
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          npm run check 2>&1 | Tee-Object frontend-ultra.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build 2>&1 | Tee-Object -Append frontend-ultra.log
          exit $LASTEXITCODE

      - name: Validate Rust
        id: rust
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo fmt 2>&1 | Tee-Object ../rust-ultra.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --quiet 2>&1 | Tee-Object -Append ../rust-ultra.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --all-targets --quiet -- -D warnings 2>&1 | Tee-Object -Append ../rust-ultra.log
          exit $LASTEXITCODE

      - name: Commit Ultra mode
        id: commit
        if: steps.migrate.outcome == 'success' && steps.frontend.outcome == 'success' && steps.rust.outcome == 'success'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src src-tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Add exhaustive Ultra scan mode"
            git pull --rebase origin main
            git push origin HEAD:main
          }

      - name: Publish diagnostics
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $migration = if (Test-Path ultra-migration.log) { Get-Content ultra-migration.log -Raw } else { "not run" }
          $frontend = if (Test-Path frontend-ultra.log) { Get-Content frontend-ultra.log -Raw } else { "not run" }
          $rust = if (Test-Path rust-ultra.log) { Get-Content rust-ultra.log -Raw } else { "not run" }
          $ok = "${{ steps.migrate.outcome }}" -eq "success" -and "${{ steps.frontend.outcome }}" -eq "success" -and "${{ steps.rust.outcome }}" -eq "success"
          $body = @"
          # Ultra mode migration

          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Migration: ${{ steps.migrate.outcome }}
          Frontend: ${{ steps.frontend.outcome }}
          Rust: ${{ steps.rust.outcome }}

          ## Migration
          ```text
          $migration
          ```

          ## Frontend
          ```text
          $frontend
          ```

          ## Rust
          ```text
          $rust
          ```
          "@
          gh issue edit 2 --repo "${{ github.repository }}" --title "Automated validation diagnostics" --body $body
          if ($ok) { gh issue close 2 --repo "${{ github.repository }}" --reason completed }
          else { gh issue reopen 2 --repo "${{ github.repository }}" }
          if (-not $ok) { exit 1 }

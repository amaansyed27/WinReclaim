name: Apply Ultra Mode

on:
  push:
    branches: [main]
    paths:
      - "scripts/apply-ultra-mode.mjs"
      - ".github/workflows/apply-ultra-mode.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Apply Ultra mode changes
        run: node scripts/apply-ultra-mode.mjs

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        run: |
          npm run check
          npm run build

      - name: Validate Rust
        working-directory: src-tauri
        run: |
          cargo fmt
          cargo test --quiet
          cargo clippy --all-targets --quiet -- -D warnings

      - name: Commit Ultra mode
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src src-tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Add exhaustive Ultra scan mode"
            git push origin HEAD:main
          }

name: Format Storage Assistant PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'local-storage-assistant' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Format Rust and refresh lockfile
        shell: bash
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml
          cargo generate-lockfile --manifest-path src-tauri/Cargo.toml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git commit -m "Format Storage Assistant implementation"
          git push

name: Rustfmt diagnostic

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  rustfmt:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Apply rustfmt
        id: format
        shell: bash
        run: |
          set +e
          cargo fmt --all > rustfmt.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Report parser errors
        if: steps.format.outputs.status != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'Rustfmt could not parse the branch:'
            echo
            echo '```text'
            cat rustfmt.log
            echo '```'
          } > rustfmt-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file rustfmt-comment.md
          exit 1
      - name: Commit formatting
        if: steps.format.outputs.status == '0'
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git commit -m "Apply rustfmt"
          git push

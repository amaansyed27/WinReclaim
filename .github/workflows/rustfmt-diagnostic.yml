name: Rustfmt diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Show rustfmt diff
        shell: bash
        run: cargo fmt --all -- --check

name: Validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/validate.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: winreclaim-validate
  cancel-in-progress: true

jobs:
  validate:
    name: Frontend and Rust checks
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        id: frontend_validation
        continue-on-error: true
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "frontend-validation.log"
          Remove-Item $logPath -Force -ErrorAction SilentlyContinue
          npm run check 2>&1 | Tee-Object -FilePath $logPath -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build 2>&1 | Tee-Object -FilePath $logPath -Append
          exit $LASTEXITCODE

      - name: Normalize and validate Rust
        id: rust_validation
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP "rust-validation.log"
          Remove-Item $logPath -Force -ErrorAction SilentlyContinue
          cargo fmt 2>&1 | Tee-Object -FilePath $logPath -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --quiet 2>&1 | Tee-Object -FilePath $logPath -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --all-targets --quiet -- -D warnings 2>&1 | Tee-Object -FilePath $logPath -Append
          exit $LASTEXITCODE

      - name: Commit normalized Rust source
        if: steps.frontend_validation.outcome == 'success' && steps.rust_validation.outcome == 'success'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Normalize Rust source"
            git push origin HEAD:main
          }

      - name: Publish validation diagnostics
        if: steps.frontend_validation.outcome == 'failure' || steps.rust_validation.outcome == 'failure'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $frontendPath = Join-Path $env:RUNNER_TEMP "frontend-validation.log"
          $rustPath = Join-Path $env:RUNNER_TEMP "rust-validation.log"
          $frontendLog = if (Test-Path $frontendPath) { (Get-Content $frontendPath -Tail 180) -join "`n" } else { "Frontend validation did not run." }
          $rustLog = if (Test-Path $rustPath) { (Get-Content $rustPath -Tail 240) -join "`n" } else { "Rust validation did not run." }
          $bodyPath = Join-Path $env:RUNNER_TEMP "validation-diagnostics.md"
          @(
            "# Automated validation diagnostics"
            ""
            "Commit: $env:GITHUB_SHA"
            "Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "Frontend: ${{ steps.frontend_validation.outcome }}"
            "Rust: ${{ steps.rust_validation.outcome }}"
            ""
            "## Frontend"
            '```text'
            $frontendLog
            '```'
            ""
            "## Rust"
            '```text'
            $rustLog
            '```'
          ) | Set-Content $bodyPath -Encoding utf8
          gh issue reopen 2 --repo $env:GITHUB_REPOSITORY 2>$null
          gh issue edit 2 --repo $env:GITHUB_REPOSITORY --body-file $bodyPath
          throw "Validation failed. Issue #2 contains the logs."

      - name: Close resolved validation issue
        if: steps.frontend_validation.outcome == 'success' && steps.rust_validation.outcome == 'success'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close 2 --repo $env:GITHUB_REPOSITORY --comment "Frontend and Rust validation passed for $env:GITHUB_SHA." 2>$null

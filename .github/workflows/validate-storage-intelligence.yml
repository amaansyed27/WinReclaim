name: Validate Storage Intelligence

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - ".github/workflows/validate-storage-intelligence.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: winreclaim-storage-intelligence-final
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Apply final Clippy normalizations
        shell: pwsh
        run: |
          $insightsPath = "src-tauri/src/insights/mod.rs"
          $insights = [System.IO.File]::ReadAllText($insightsPath)
          $insights = $insights.Replace(
            'records.sort_by(|left, right| left.captured_at.cmp(&right.captured_at));',
            'records.sort_by_key(|record| record.captured_at);'
          )
          [System.IO.File]::WriteAllText($insightsPath, $insights)

          $vaultPath = "src-tauri/src/vault/mod.rs"
          $vault = [System.IO.File]::ReadAllText($vaultPath)
          $vault = $vault.Replace(
            'entries.sort_by(|left, right| right.created_at.cmp(&left.created_at));',
            'entries.sort_by_key(|entry| std::cmp::Reverse(entry.created_at));'
          )
          [System.IO.File]::WriteAllText($vaultPath, $vault)

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate frontend
        id: frontend
        continue-on-error: true
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "storage-intelligence-frontend.log"
          Remove-Item $log -Force -ErrorAction SilentlyContinue
          npm run check 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Validate Rust
        id: rust
        continue-on-error: true
        working-directory: src-tauri
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "storage-intelligence-rust.log"
          Remove-Item $log -Force -ErrorAction SilentlyContinue
          cargo fmt 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --quiet 2>&1 | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo clippy --all-targets --quiet -- -D warnings 2>&1 | Tee-Object -FilePath $log -Append
          exit $LASTEXITCODE

      - name: Commit normalized Rust
        if: steps.frontend.outcome == 'success' && steps.rust.outcome == 'success'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Normalize storage intelligence Rust source"
            git push origin HEAD:main
          }

      - name: Publish final validation
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $frontendPath = Join-Path $env:RUNNER_TEMP "storage-intelligence-frontend.log"
          $rustPath = Join-Path $env:RUNNER_TEMP "storage-intelligence-rust.log"
          $frontendLog = if (Test-Path $frontendPath) { (Get-Content $frontendPath -Tail 180) -join "`n" } else { "not run" }
          $rustLog = if (Test-Path $rustPath) { (Get-Content $rustPath -Tail 260) -join "`n" } else { "not run" }
          $success = "${{ steps.frontend.outcome }}" -eq "success" -and "${{ steps.rust.outcome }}" -eq "success"
          $body = Join-Path $env:RUNNER_TEMP "storage-intelligence-validation.md"
          @(
            "# Storage intelligence final validation"
            ""
            "Commit: $env:GITHUB_SHA"
            "Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            "Frontend: ${{ steps.frontend.outcome }}"
            "Rust: ${{ steps.rust.outcome }}"
            "Ready: $success"
            ""
            "## Frontend"
            '```text'
            $frontendLog
            '```'
            ""
            "## Rust"
            '```text'
            $rustLog
            '```'
          ) | Set-Content $body -Encoding utf8
          gh issue edit 4 --repo $env:GITHUB_REPOSITORY --body-file $body
          if ($success) {
            gh issue close 4 --repo $env:GITHUB_REPOSITORY --reason completed 2>$null
          } else {
            gh issue reopen 4 --repo $env:GITHUB_REPOSITORY 2>$null
            throw "Storage intelligence validation failed"
          }

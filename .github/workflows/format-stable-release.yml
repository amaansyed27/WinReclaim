name: Format stable release

on:
  push:
    branches:
      - release/stable-deterministic-1.2.1
    paths:
      - .github/workflows/format-stable-release.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/stable-deterministic-1.2.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - name: Format and refresh lockfile
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all
          cargo check --manifest-path src-tauri/Cargo.toml --all-targets
      - name: Commit generated changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri
          if (-not (git diff --cached --quiet)) {
            git commit -m "chore: format deterministic stable release"
            git push origin HEAD:release/stable-deterministic-1.2.1
          }
